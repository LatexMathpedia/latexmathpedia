<body>
    <header>
        <div class="header_div_superior"> <!--rectángulo superior del header en negro-->

            </div>
        </div>
    </header>
    <main>
        <div class="container">
            <h2 id="login_title">Iniciar sesión</h2>
            <form id="login_form">
                <input type="email" id="email" placeholder="Correo electrónico" required />
                <input type="password" id="password" placeholder="Contraseña" required />
                <button id="sign_in" type="submit">INICIAR SESION</button>
            </form>
            <p>Si todavía no tienes una cuenta, creala <a href="create_account.html">aquí</a></p>
    </main>
    <footer>
        <div class="footer_main_container">
            <div class="footer_left_section">©The Math Texpedia</div>
            <div class="footer_middle_section"><a href=""></a></div>
            <div class="footer_right_section"> <!--lista de items de navegación-->
                <ul class="footer_list">
                    <li><a href="mailto:latexmathpedia@gmail.com"><img
                                src="https://firebasestorage.googleapis.com/v0/b/mathtexpedia.appspot.com/o/img_pages%2Fmail_logo.svg?alt=media&token=083ad807-4fef-4efb-9180-58f87e40d592"
                                alt="Logo gmail"></a></li>
                    <li><a href="https://x.com/MathsTexpedia" target="_blank"><img

                                alt="Logo Twitter"></a></li>
                    <li><a href="https://www.instagram.com/mathtexpedia.ofisial/" target="_blank" rel="noopener"><img

                                alt="Logo Instagram" id="footer_last_img"></a></li>
                </ul>
            </div>
        </div>
    </footer>
</body>
<script>
    document.getElementById('login_form').addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
            event.preventDefault();
            document.getElementById('sign_in').click();
        }
    })
</script>

</html>
